<html class="light" lang="en">

    <link

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at top left,
          #e2dfff 0%,
          #f9f9ff 50%,
          #e7eefe 100%
        );
      }
      .glass-effect {
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.8);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-gutter">
    <!-- TopNavBar Suppression: Page is Linear/Transactional (Login) -->
    <main class="w-full max-w-md">
      <!-- Brand Identity Center -->
      <div class="text-center mb-xl">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary-container shadow-lg mb-md"
        >
          <span
            class="material-symbols-outlined text-3xl"
            data-icon="account_balance_wallet"
            >account_balance_wallet</span
          >
        </div>
        <h1 class="font-h1 text-h1 text-on-background tracking-tight">
          FinTrack
        </h1>
        <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
          Master your money with precision.
        </p>
      </div>
      <!-- Auth Card -->
      <div
        class="bg-surface-container-lowest border border-outline-variant/30 shadow-xl rounded-xl overflow-hidden"
      >
        <!-- Tabs -->
        <div class="flex border-b border-outline-variant/30">
          <button
            class="flex-1 py-md font-label-md text-label-md border-b-2 border-primary text-primary bg-surface-bright"
          >
            Login
          </button>
          <button
            class="flex-1 py-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:bg-surface-container-low transition-colors"
          >
            Register
          </button>
        </div>
        <div class="p-lg">
          <form class="space-y-lg">
            <!-- Email Field -->
            <div class="space-y-sm">
              <label
                class="font-label-md text-label-md text-on-surface"
                for="email"
                >Email Address</label
              >
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
                  data-icon="mail"
                  >mail</span
                >
                <input
                  class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-bright focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-sm text-body-sm"
                  id="email"
                  name="email"
                  placeholder="name@example.com"
                  type="email"
                />
              </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-sm">
              <div class="flex justify-between items-center">
                <label
                  class="font-label-md text-label-md text-on-surface"
                  for="password"
                  >Password</label
                >
                <a
                  class="font-label-sm text-label-sm text-primary hover:underline"
                  href="#"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
                  data-icon="lock"
                  >lock</span
                >
                <input
                  class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-bright focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-sm text-body-sm"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  type="password"
                />
              </div>
            </div>
            <!-- Remember Me -->
            <div class="flex items-center gap-sm">
              <input
                class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary"
                id="remember"
                type="checkbox"
              />
              <label
                class="font-body-sm text-body-sm text-on-surface-variant select-none"
                for="remember"
                >Stay logged in for 30 days</label
              >
            </div>
            <!-- CTA Button -->
            <button
              class="w-full py-md px-lg bg-primary text-on-primary rounded-lg font-label-md text-label-md shadow-md hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm"
              type="submit"
            >
              Sign In to Dashboard
              <span
                class="material-symbols-outlined text-lg"
                data-icon="arrow_forward"
                >arrow_forward</span
              >
            </button>
          </form>
          <!-- Social Auth Separator -->
          <div class="relative my-xl">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-outline-variant/30"></div>
            </div>
            <div class="relative flex justify-center">
              <span
                class="bg-surface-container-lowest px-md font-label-sm text-label-sm text-outline"
                >OR CONTINUE WITH</span
              >
            </div>
          </div>
          <!-- Social Buttons Grid -->
          <div class="grid grid-cols-2 gap-md">
            <button
              class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface"
            >
              <img
                alt="Google"
                class="w-4 h-4"
                data-alt="clean minimalist google logo with its signature four colors on a white background icon style"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDuzwvl5UMiMfS_YO5t7NoBnLLzy6IDL99LLuXIhTgw9QSlKA0dO4U5q4-pKHAa1FNhq9WpMkWtSrP2o_VML85E0BlyUX9t248FMcsWaGD7od2t-y17n9ELeVLOKa8MFTZZmu22Ml0VWlLgQJV2bs0MHkppiQvDrns1Z7N7fcHD-FbgK_W7ui4DAirOsqbKiaG_2Nfd-1243OuTJURb3ZdAJAUSWx05vRuftyPlZEjttNaeG7BdT1YoEo2a9tTIIZcHvnABP-kcg"
              />
              Google
            </button>
            <button
              class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface"
            >
              <span class="material-symbols-outlined text-xl" data-icon="apple"
                >ios</span
              >
              Apple
            </button>
          </div>
        </div>
        <!-- Footer -->
        <div class="bg-surface-container-low p-md text-center">
          <p class="font-body-sm text-body-sm text-on-surface-variant">
            Don't have an account?
            <a class="text-primary font-semibold hover:underline" href="#"
              >Create an account</a
            >
          </p>
        </div>
      </div>
      <!-- System Status or Trust Badges (Subtle) -->
      <div class="mt-xl flex justify-center items-center gap-lg">
        <div class="flex items-center gap-xs opacity-60">
          <span
            class="material-symbols-outlined text-sm"
            data-icon="verified_user"
            >verified_user</span
          >
          <span class="font-label-sm text-label-sm">256-bit Encryption</span>
        </div>
        <div class="flex items-center gap-xs opacity-60">
          <span class="material-symbols-outlined text-sm" data-icon="shield"
            >shield</span
          >
          <span class="font-label-sm text-label-sm">Privacy Guaranteed</span>
        </div>
      </div>
    </main>
    <!-- SideNavBar & BottomNavBar Suppression: Page is Linear/Transactional (Login) -->
  </body>
</html>
